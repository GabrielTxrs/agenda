<mat-toolbar>
    <span>Contatos</span>
</mat-toolbar>

<form [formGroup]="formGroup" (ngSubmit)="submit()">
    <div *ngIf="formGroup.controls['nome'].errors">Nome é obrigatório</div>
    <mat-form-field class="full-width">
        <mat-label>
            Nome:
        </mat-label>
        <input formControlName="nome" matInput placeholder="Digite seu nome:" />
    </mat-form-field>

    <div *ngIf="formGroup.controls['email'].errors">
        <div *ngIf="formGroup.controls['email'].errors['required']">
            Email é obrigatório
        </div>
        <div *ngIf="formGroup.controls['email'].errors">
            Email é inválido
        </div>
    </div>
    <mat-form-field class="full-width">
        <mat-label>
            Email:
        </mat-label>
        <input formControlName="email" matInput placeholder="Digite seu email:" />


    </mat-form-field>

    <button [disabled]="!formGroup.valid" mat-raised-button color="primary"> Adicionar:</button>
</form>
