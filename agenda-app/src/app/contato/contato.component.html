<mat-toolbar>
    <mat-icon>account_circle</mat-icon>
    <span> Contatos</span>
</mat-toolbar>

<mat-tab-group>

    <mat-tab>
        <ng-template mat-tab-label>
            <mat-icon>face</mat-icon>
            Novo
        </ng-template>
        <mat-card style="margin-left: 1%;">
            <mat-card-title>Novo Contato</mat-card-title>
            <form [formGroup]="formGroup" (ngSubmit)="submit()">
                <div class="half-width">
                    <mat-form-field class="full-width">
                        <mat-label>
                            Nome:
                            <small *ngIf="formGroup.controls['nome'].errors">Nome é obrigatório</small>
                        </mat-label>
                        <input formControlName="nome" matInput placeholder="Digite seu nome:" />
                    </mat-form-field>
                </div>

                <div class="half-width">
                    <mat-form-field class="full-width">
                        <mat-label>
                            Email:
                            <small *ngIf="formGroup.controls['email'].errors">
                                Email é inválido
                            </small>
                        </mat-label>
                        <input formControlName="email" matInput placeholder="Digite seu email:" />
                    </mat-form-field>
                </div>

                <button style="margin-bottom: 2%;" [disabled]="!formGroup.valid" mat-raised-button color="primary"> Adicionar:</button>
            </form>
        </mat-card>

        <mat-tab>
            <ng-template mat-tab-label>
                <mat-icon>list</mat-icon>
                Consulta
            </ng-template>

            <mat-card>
                <table mat-table [dataSource]="contatos">
                    <ng-container matColumnDef="id">
                        <th mat-header-cell *matHeaderCellDef> Id </th>
                        <td mat-cell *matCellDef="let contato"> {{contato.id}} </td>
                    </ng-container>
                    <ng-container matColumnDef="nome">
                        <th mat-header-cell *matHeaderCellDef> Nome </th>
                        <td mat-cell *matCellDef="let contato"> {{contato.nome}} </td>
                    </ng-container>
                    <ng-container matColumnDef="email">
                        <th mat-header-cell *matHeaderCellDef> Email </th>
                        <td mat-cell *matCellDef="let contato"> {{contato.email}} </td>
                    </ng-container>
                    <ng-container matColumnDef="favorito">
                        <th mat-header-cell *matHeaderCellDef> Favorito </th>
                        <td mat-cell *matCellDef="let contato">
                            <mat-icon>
                                {{contato.favorito? 'favorite' : 'favorite_border'}}
                            </mat-icon>
                        </td>
                    </ng-container>

                    <tr mat-header-row *matHeaderRowDef="colunas"></tr>
                    <tr mat-row *matRowDef="let row; columns: colunas;"></tr>
                </table>
            </mat-card>
        </mat-tab>
    </mat-tab>
</mat-tab-group>
